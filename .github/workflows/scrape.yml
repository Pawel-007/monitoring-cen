name: Codzienny scraper cen

on:
  schedule:
    # Codziennie o 20:00 UTC = 22:00 czasu polskiego (obecnie: czas letni, CEST, UTC+2).
    # UWAGA: Polska zmienia czas na zimowy (CET, UTC+1) pod koniec października —
    # od tego momentu ten harmonogram uruchomi się realnie o 23:00, a nie 22:00,
    # bo GitHub Actions liczy zawsze w UTC i nie zna polskiej zmiany czasu.
    # Żeby utrzymać dokładnie 22:00 przez cały rok, trzeba by ręcznie zmienić
    # tę linię na '0 21 * * *' po przejściu na czas zimowy (i z powrotem na wiosnę).
    - cron: '0 20 * * *'
  workflow_dispatch:
    # Pozwala odpalić workflow ręcznie z zakładki "Actions" w GitHubie — przydatne do testów,
    # bez czekania do 4:00 rano.

permissions:
  contents: write   # bez tego workflow nie miałby prawa zapisać wyników z powrotem do repozytorium

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v6

      - name: Ustaw Pythona
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Uruchom scraper
        run: python scraper.py

      - name: Wygeneruj stronę HTML z dashboardem (Klocek 5)
        run: python generate_dashboard_html.py

      - name: Przenieś dzisiejszy wynik do folderu z historią
        run: |
          mkdir -p wyniki
          cp ceny_*.csv wyniki/

      - name: Zapisz wyniki z powrotem do repozytorium
        run: |
          git config user.name "Robot cenowy"
          git config user.email "actions@github.com"
          git add wyniki/ dashboard_podglad.csv docs/index.html
          git commit -m "Codzienna aktualizacja cen $(date +'%Y-%m-%d')" || echo "Brak zmian do zapisania — dzisiejszy wynik identyczny jak poprzedni."
          git push
